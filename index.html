<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* Simple fallback styling while the redirect processes */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting you to today's page...</p>
        <p><small>If you are not redirected automatically, <a id="fallback-link" href="#">click here</a>.</small></p>
    </div>

    <script>
        // 1. Define your URLs for each day of the week
        // JavaScript Date.getDay() returns: 0 = Sunday, 1 = Monday, ..., 6 = Saturday
        const redirectUrls = {
            1: "https://example.com",
            2: "https://example.com",
            3: "https://example.com",
            4: "https://example.com",
            5: "aurebesh.html",
            6: "https://example.com",
            0: "https://example.com"
        };

        // 2. Get the current day index (0 through 6)
        const currentDayIndex = new Date().getDay();

        // 3. Look up the matching URL
        const destinationUrl = redirectUrls[currentDayIndex];

        // 4. Update the fallback link just in case the browser blocks automatic redirects
        document.getElementById('fallback-link').href = destinationUrl;

        // 5. Execute the automatic redirect immediately
        window.location.href = destinationUrl;
    </script>

</body>
</html>
